"$schema" = 'https://starship.rs/config-schema.json'
palette = "noctalia"

# Line 1: path + git | exec time right-aligned
# Line 2: ❯
format = """
$directory$git_branch$git_status\
$fill\
$cmd_duration
$character"""

add_newline = false

# Full path in Kanagawa blue — zen 'style = full'
[directory]
format = "[$path]($style)"
style = "blue bold"
truncation_length = 0
truncate_to_repo = false
read_only = " "

# ' branch' in grey — nerd font icon matches zen branch_icon=''
[git_branch]
format = "[ $branch]($style)"
style = "subtext0"
symbol = " "

# * dirty (working or staging), ⇣⇡ in teal/cyan — zen cyan for ahead/behind
[git_status]
format = '([$all_status](subtext0)[$ahead_behind](cyan) )'
modified = "*"
staged = "*"
untracked = ""
deleted = ""
renamed = ""
conflicted = ""
stashed = ""
ahead = "⇡"
behind = "⇣"
diverged = "⇡⇣"
up_to_date = ""

[fill]
symbol = " "

# Exec time — threshold 5000ms, yellow — exact match to zen
[cmd_duration]
min_time = 5000
format = "[$duration]($style)"
style = "yellow"

# ❯ — magenta success, red error — exact match to zen
[character]
success_symbol = "[❯](magenta)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](magenta)"

# Minimal — zen shows nothing else
[username]
disabled = true
[hostname]
disabled = true
[time]
disabled = true
[battery]
disabled = true
[package]
disabled = true
[nodejs]
disabled = true
[python]
disabled = true
[rust]
disabled = true
[golang]
disabled = true
[java]
disabled = true
[lua]
disabled = true
[docker_context]
disabled = true




