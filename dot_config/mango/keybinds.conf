# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER,r,reload_config
bind=SUPER,Escape,spawn_shell,pkill qs || true; qs -c noctalia-shell

# noctalia shell
bind=SUPER,space,spawn,qs -c noctalia-shell ipc call launcher toggle
bind=SUPER,s,spawn,qs -c noctalia-shell ipc call controlCenter toggle
bind=SUPER,comma,spawn,qs -c noctalia-shell ipc call settings toggle

bind=SUPER,Return,spawn,foot

# exit
bind=CTRL+SHIFT,m,quit
bind=SUPER+SHIFT,c,killclient,

# screenshot
bind=none,Print,spawn_shell,grim -g "$(slurp)" - | wl-copy

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up

# swap window
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right

# switch window status
bind=ALT,Tab,toggleoverview,
bind=SUPER,f,togglefullscreen,
bind=SUPER+SHIFT,space,togglefloating,

bind=SUPER,g,toggleglobal,

# minimize
bind=SUPER+SHIFT,I,restore_minimized
bind=SUPER,i,minimized,

# scratchpad — a hidden floating window that toggles on/off on any tag
# use ALT+z to show/hide it; first time opens whatever client you assigned
bind=ALT,z,toggle_scratchpad

bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,o,toggleoverlay,

# scroller layout — proportion = how much screen width focused column takes
# SUPER+e: fullwidth (1.0), SUPER+x: cycle through presets (0.5 / 0.8 / 1.0)
bind=SUPER,e,set_proportion,1.0
bind=SUPER,x,switch_proportion_preset,

# switch layout
bind=SUPER,n,switch_layout

# tag switch
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# move client to tag
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# monitor switch
bind=SUPER,q,focusmon,right
bind=SUPER+SHIFT,q,tagmon,right

# volume (noctalia) — Fn+F10/F11/F12 on Keychron K2 (Fn remaps at firmware, OS sees XF86 syms)
bind=NONE,XF86AudioMute,spawn,qs -c noctalia-shell ipc call volume muteOutput
bind=NONE,XF86AudioLowerVolume,spawn,qs -c noctalia-shell ipc call volume decrease
bind=NONE,XF86AudioRaiseVolume,spawn,qs -c noctalia-shell ipc call volume increase

# Mouse Button Bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# Axis Bindings — SUPER+scroll moves focused window to adjacent tag
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client
